<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Absensi Petugas Amil Zakat</title>
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Signature Pad -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <!-- Load konfigurasi dan API (pastikan file berada di folder yang sama) -->
    <script src="/zakat/js/config.js"></script>
    <script src="/zakat/js/api.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .card-absen {
            max-width: 560px;
            width: 100%;
            border-radius: 28px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .card-header {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            text-align: center;
            border-radius: 28px 28px 0 0 !important;
            padding: 20px 20px;
            border-bottom: none;
        }
        .card-header h3 {
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .card-body {
            padding: 24px;
        }
        .nav-tabs {
            border-bottom: 2px solid #dee2e6;
            margin-bottom: 20px;
        }
        .nav-tabs .nav-link {
            border: none;
            font-weight: 600;
            color: #495057;
            padding: 10px 16px;
            border-radius: 40px;
            margin-right: 8px;
            transition: all 0.2s;
        }
        .nav-tabs .nav-link.active {
            background-color: #28a745;
            color: white;
        }
        .form-label {
            font-weight: 500;
            color: #2d3748;
            margin-bottom: 6px;
        }
        .form-control, .form-select {
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40,167,69,0.15);
        }
        .btn-absen {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            border-radius: 40px;
            padding: 14px;
            font-weight: 600;
            font-size: 1.1rem;
            border: none;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(40,167,69,0.3);
        }
        .btn-absen:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(40,167,69,0.4);
        }
        .btn-absen:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .signature-area {
            border: 2px dashed #28a745;
            border-radius: 16px;
            padding: 12px;
            background: #f8fafc;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            max-height: 160px;
            background: white;
            border-radius: 12px;
            touch-action: none;
            margin: 0 auto;
        }
        .signature-buttons {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            justify-content: center;
        }
        .btn-signature {
            border-radius: 9999px;
            padding: 0.4rem 1.6rem;
            font-size: 0.9rem;
        }
        .info-sesi {
            background: #e6f7e6;
            border-radius: 16px;
            padding: 12px 16px;
            font-size: 0.95rem;
            border-left: 5px solid #28a745;
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        .toast {
            background: white;
            border-left: 5px solid;
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
            border-radius: 16px;
        }
        .toast.border-success { border-left-color: #28a745; }
        .toast.border-danger { border-left-color: #dc3545; }
        .text-small {
            font-size: 0.85rem;
        }
        .input-group {
            border-radius: 14px;
            overflow: hidden;
        }
        .input-group .btn {
            border: 1px solid #e2e8f0;
            background: white;
        }
        .refresh-btn {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .refresh-btn:hover {
            transform: rotate(90deg);
        }
    </style>
</head>
<body>
    <!-- Toast Notifikasi -->
    <div class="toast-container">
        <div id="notificationToast" class="toast border-0 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="3000">
            <div class="toast-header bg-white border-0">
                <i class="bi me-2" id="toastIcon"></i>
                <strong class="me-auto" id="toastTitle">Berhasil</strong>
                <small>baru saja</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <div class="card card-absen">
        <div class="card-header">
            <h3><i class="bi bi-building me-2"></i>Masjid Al-Ikhlas Ngijo</h3>
            <p class="mb-0 opacity-75">Form Absensi Petugas</p>
        </div>
        <div class="card-body">
            <!-- Nav tabs - akan disembunyikan jika mode QR -->
            <ul class="nav nav-tabs" id="absenTab" role="tablist" style="display: none;">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="qr-tab" data-bs-toggle="tab" data-bs-target="#qr" type="button" role="tab" aria-controls="qr" aria-selected="true"><i class="bi bi-qr-code-scan me-1"></i> Scan QR</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="manual-tab" data-bs-toggle="tab" data-bs-target="#manual" type="button" role="tab" aria-controls="manual" aria-selected="false"><i class="bi bi-pencil-square me-1"></i> Manual</button>
                </li>
            </ul>

            <!-- Tab panes -->
            <div class="tab-content" id="absenTabContent">
                <!-- Panel QR -->
                <div class="tab-pane fade show active" id="qr" role="tabpanel" aria-labelledby="qr-tab">
                    <div id="qrInfoSesi" class="info-sesi d-none mb-4">
                        <i class="bi bi-info-circle me-2"></i> <span id="qrInfoSesiText"></span>
                    </div>
                    <div class="mb-3">
                        <label for="qrNama" class="form-label"><i class="bi bi-person me-1"></i>Nama Petugas</label>
                        <input type="text" class="form-control" id="qrNama" placeholder="Masukkan nama lengkap" autocomplete="off">
                    </div>
                    <!-- Password disembunyikan karena otomatis dari QR, tapi tetap ada hidden field -->
                    <input type="hidden" id="qrPassword" value="">
                </div>

                <!-- Panel Manual -->
                <div class="tab-pane fade" id="manual" role="tabpanel" aria-labelledby="manual-tab">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="form-label mb-0"><i class="bi bi-calendar-event me-1"></i>Pilih Sesi Aktif</label>
                        <button class="btn btn-sm btn-outline-secondary refresh-btn" onclick="loadSesiAktif(true)" title="Refresh daftar sesi">
                            <i class="bi bi-arrow-repeat"></i>
                        </button>
                    </div>
                    <div class="mb-3">
                        <select class="form-select" id="manualSesi" required>
                            <option value="">-- Memuat sesi --</option>
                        </select>
                        <div class="form-text" id="manualSesiInfo"></div>
                    </div>
                    <div class="mb-3">
                        <label for="manualPassword" class="form-label"><i class="bi bi-lock me-1"></i>Password Sesi</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="manualPassword" placeholder="Masukkan password dari panitia" required>
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility('manualPassword')">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="manualNama" class="form-label"><i class="bi bi-person me-1"></i>Nama Petugas</label>
                        <input type="text" class="form-control" id="manualNama" placeholder="Masukkan nama lengkap" autocomplete="off">
                    </div>
                </div>
            </div>

            <!-- Tanda Tangan Signature Pad (digunakan bersama) -->
            <div class="mb-4">
                <label class="form-label"><i class="bi bi-pencil me-1"></i>Tanda Tangan Digital</label>
                <div class="signature-area">
                    <canvas id="signatureCanvas" width="400" height="160"></canvas>
                </div>
                <div class="signature-buttons">
                    <button type="button" class="btn btn-outline-secondary" id="clearSignature">Hapus</button>
                    <button type="button" class="btn btn-outline-primary" id="undoSignature">Undo</button>
                </div>
                <div class="form-text mt-2">Tanda tangani di area ini (bisa dengan jari)</div>
            </div>

            <!-- Tombol Submit -->
            <button class="btn-absen" id="btnSubmit" onclick="submitAbsen()">
                <span id="submitText">Absen Sekarang</span>
                <span id="submitSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
            </button>

            <!-- Alert cadangan -->
            <div id="alertMessage" class="alert d-none mt-3"></div>
        </div>
    </div>

    <script>
        // =====================================================
        // KONFIGURASI & STATE
        // =====================================================
        let cachedSesi = null;
        let signaturePad;
        let isQRMode = false;
        let qrSesiId = null;
        let qrToken = null;

        // =====================================================
        // FUNGSI TOAST
        // =====================================================
        function showToast(message, type = 'success') {
            const toastEl = document.getElementById('notificationToast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');
            const toastTitle = document.getElementById('toastTitle');

            toastMessage.innerText = message;

            if (type === 'success') {
                toastEl.classList.add('border-success');
                toastEl.classList.remove('border-danger');
                toastIcon.className = 'bi bi-check-circle-fill me-2 text-success';
                toastTitle.innerText = 'Berhasil';
                toastTitle.style.color = '#28a745';
            } else {
                toastEl.classList.add('border-danger');
                toastEl.classList.remove('border-success');
                toastIcon.className = 'bi bi-x-circle-fill me-2 text-danger';
                toastTitle.innerText = 'Gagal';
                toastTitle.style.color = '#dc3545';
            }

            const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
            toast.show();
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = message;
            alertDiv.classList.remove('d-none');
            setTimeout(() => alertDiv.classList.add('d-none'), 5000);
        }

        // =====================================================
        // PARAMETER URL
        // =====================================================
        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                sesi_id: params.get('sesi_id'),
                token: params.get('token')
            };
        }

        // =====================================================
        // SIGNATURE PAD
        // =====================================================
        function initSignaturePad() {
    const canvas = document.getElementById('signatureCanvas');
    if (!canvas) return;

    // Set ukuran canvas lebih kecil (200x80)
    canvas.width = 200;
    canvas.height = 80;

    signaturePad = new SignaturePad(canvas, {
        backgroundColor: 'white',
        penColor: 'black'
    });
    signaturePad.clear();
    // ... sisanya tetap sama

            document.getElementById('clearSignature').addEventListener('click', () => {
                signaturePad.clear();
                if (!isQRMode) saveFormState();
            });

            document.getElementById('undoSignature').addEventListener('click', () => {
                const data = signaturePad.toData();
                if (data && data.length > 0) {
                    data.pop();
                    signaturePad.fromData(data);
                    if (!isQRMode) saveFormState();
                }
            });

            if (!isQRMode) {
                signaturePad.addEventListener('endStroke', saveFormState);
            }
        }

        // =====================================================
        // STATE FORM (hanya mode manual)
        // =====================================================
        function saveFormState() {
            if (isQRMode) return;
            const nama = document.getElementById('manualNama')?.value || '';
            const sesiId = document.getElementById('manualSesi')?.value || '';
            let signatureData = null;
            if (signaturePad && !signaturePad.isEmpty()) {
                signatureData = signaturePad.toData();
            }
            localStorage.setItem('absenFormState', JSON.stringify({ nama, sesiId, signatureData }));
        }

        function restoreFormState() {
            if (isQRMode) return;
            const saved = localStorage.getItem('absenFormState');
            if (!saved) return;
            try {
                const { nama, sesiId, signatureData } = JSON.parse(saved);
                if (nama) document.getElementById('manualNama').value = nama;
                if (sesiId) document.getElementById('manualSesi').value = sesiId;
                if (signatureData && signaturePad) {
                    signaturePad.fromData(signatureData);
                }
            } catch (e) {}
        }

        function clearFormState() {
            localStorage.removeItem('absenFormState');
        }

        // =====================================================
        // LOAD SESI AKTIF (dengan cache dan opsi refresh)
        // =====================================================
        async function fetchSesiAktif(forceRefresh = false) {
            const cacheKey = 'zakatSesiCache';
            const cacheTimeKey = 'zakatSesiCacheTime';
            const now = Date.now();
            const maxAge = 5 * 60 * 1000; // 5 menit

            if (!forceRefresh) {
                try {
                    const cached = sessionStorage.getItem(cacheKey);
                    const cachedTime = sessionStorage.getItem(cacheTimeKey);
                    if (cached && cachedTime && (now - parseInt(cachedTime)) < maxAge) {
                        const parsed = JSON.parse(cached);
                        if (parsed && Array.isArray(parsed)) {
                            cachedSesi = parsed;
                            return parsed;
                        }
                    }
                } catch (e) {}
            }

            try {
                const sesiList = await apiGetSesiAktif();
                cachedSesi = sesiList;
                sessionStorage.setItem(cacheKey, JSON.stringify(sesiList));
                sessionStorage.setItem(cacheTimeKey, now.toString());
                return sesiList;
            } catch (error) {
                console.error('Gagal fetch sesi:', error);
                throw error;
            }
        }

        function getCachedSesi() {
            const cacheKey = 'zakatSesiCache';
            const cacheTimeKey = 'zakatSesiCacheTime';
            const now = Date.now();
            const maxAge = 5 * 60 * 1000;
            try {
                const cached = sessionStorage.getItem(cacheKey);
                const cachedTime = sessionStorage.getItem(cacheTimeKey);
                if (cached && cachedTime && (now - parseInt(cachedTime)) < maxAge) {
                    return JSON.parse(cached);
                }
            } catch (e) {}
            return null;
        }

        async function loadSesiAktif(forceRefresh = false) {
            if (isQRMode) return;
            const select = document.getElementById('manualSesi');
            const info = document.getElementById('manualSesiInfo');

            select.innerHTML = '<option value="">Memuat...</option>';
            info.innerHTML = '<span class="text-muted">Mengambil data sesi...</span>';

            try {
                let sesiList;
                if (forceRefresh) {
                    sesiList = await fetchSesiAktif(true);
                } else {
                    const cached = getCachedSesi();
                    if (cached && cached.length > 0) {
                        populateSesiDropdown(cached, select, info);
                        fetchSesiAktif(true).then(newList => {
                            if (JSON.stringify(newList) !== JSON.stringify(cached)) {
                                populateSesiDropdown(newList, select, info);
                            }
                        }).catch(err => console.warn('Update sesi gagal:', err));
                        return;
                    } else {
                        sesiList = await fetchSesiAktif(false);
                    }
                }
                populateSesiDropdown(sesiList, select, info);
            } catch (error) {
                console.error('Gagal memuat sesi:', error);
                select.innerHTML = '<option value="">Gagal memuat sesi</option>';
                info.innerHTML = '<span class="text-danger">Error memuat data sesi. Periksa koneksi.</span>';
                showToast('Gagal memuat daftar sesi: ' + error.message, 'danger');
            }
        }

        function populateSesiDropdown(sesiList, select, info) {
            if (!sesiList || sesiList.length === 0) {
                select.innerHTML = '<option value="">Tidak ada sesi aktif</option>';
                info.innerHTML = '<span class="text-warning">Belum ada sesi yang aktif saat ini. Periksa kembali jadwal atau hubungi panitia.</span>';
                return;
            }
            let options = '<option value="">-- Pilih sesi --</option>';
            sesiList.forEach(sesi => {
                const mulai = new Date(sesi.waktu_mulai).toLocaleString('id-ID', { hour12: false });
                const selesai = new Date(sesi.waktu_selesai).toLocaleString('id-ID', { hour12: false });
                options += `<option value="${sesi.id}">${sesi.nama_sesi} (${mulai} - ${selesai})</option>`;
            });
            select.innerHTML = options;
            info.innerHTML = '<span class="text-success">Pilih sesi dan masukkan password.</span>';
            restoreFormState();
        }

        // =====================================================
        // TOGGLE PASSWORD
        // =====================================================
        window.togglePasswordVisibility = function(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        };

        // =====================================================
        // SUBMIT ABSEN
        // =====================================================
        window.submitAbsen = async function() {
            let id_sesi, password, nama;

            if (isQRMode) {
                id_sesi = qrSesiId;
                password = qrToken;
                nama = document.getElementById('qrNama').value.trim();
            } else {
                id_sesi = document.getElementById('manualSesi').value;
                password = document.getElementById('manualPassword').value.trim();
                nama = document.getElementById('manualNama').value.trim();
            }

            const lat = 0;
            const lng = 0;

            const btn = document.getElementById('btnSubmit');
            const submitText = document.getElementById('submitText');
            const submitSpinner = document.getElementById('submitSpinner');

            if (!id_sesi) {
                showToast('Sesi belum dipilih atau tidak valid', 'danger');
                return;
            }
            if (!password) {
                showToast('Password sesi harus diisi', 'danger');
                return;
            }
            if (!nama) {
                showToast('Nama harus diisi', 'danger');
                return;
            }

            if (!signaturePad || signaturePad.isEmpty()) {
                showToast('Tanda tangan belum diisi', 'danger');
                return;
            }

            const ttdBase64 = signaturePad.toDataURL('image/jpeg', 0.3);

            btn.disabled = true;
            submitText.classList.add('d-none');
            submitSpinner.classList.remove('d-none');

            try {
                console.log('Mengirim data absen:', { id_sesi, nama, password, lat, lng });
                const result = await apiAbsen({
                    id_sesi: id_sesi,
                    nama_petugas: nama,
                    password: password,
                    latitude: lat,
                    longitude: lng,
                    ttd_base64: ttdBase64
                });

                showToast('Absen berhasil! Terima kasih.', 'success');

                if (isQRMode) {
                    document.getElementById('qrNama').value = '';
                } else {
                    document.getElementById('manualNama').value = '';
                    document.getElementById('manualPassword').value = '';
                }
                signaturePad.clear();
                if (!isQRMode) clearFormState();
                if (!isQRMode) loadSesiAktif(true);
            } catch (error) {
                console.error('Error detail:', error);
                showToast('Gagal mengirim absen: ' + (error.message || 'Periksa koneksi'), 'danger');
            } finally {
                btn.disabled = false;
                submitText.classList.remove('d-none');
                submitSpinner.classList.add('d-none');
            }
        };

        // =====================================================
        // INISIALISASI BERDASARKAN MODE
        // =====================================================
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = getQueryParams();
            isQRMode = !!(urlParams.sesi_id && urlParams.token);
            qrSesiId = urlParams.sesi_id;
            qrToken = urlParams.token;

            const navTabs = document.getElementById('absenTab');
            const qrPanel = document.getElementById('qr');
            const manualPanel = document.getElementById('manual');
            const qrInfoSesi = document.getElementById('qrInfoSesi');
            const qrPasswordInput = document.getElementById('qrPassword');

            if (isQRMode) {
                navTabs.style.display = 'none';
                qrPanel.classList.add('show', 'active');
                manualPanel.classList.remove('show', 'active');
                qrInfoSesi.classList.remove('d-none');
                document.getElementById('qrInfoSesiText').innerText = `Anda akan absen untuk sesi: ${qrSesiId} (memuat...)`;
                qrPasswordInput.value = qrToken;
                clearFormState();

                // Ambil nama sesi dari server
                apiGet('sesi_absen').then(allSesi => {
                    const sesiArray = Array.isArray(allSesi) ? allSesi : (allSesi.data || []);
                    const sesi = sesiArray.find(s => s.id == qrSesiId);
                    if (sesi) {
                        document.getElementById('qrInfoSesiText').innerText = `Anda akan absen untuk sesi: ${sesi.nama_sesi}`;
                    } else {
                        document.getElementById('qrInfoSesiText').innerText = `Anda akan absen untuk sesi: ${qrSesiId} (nama tidak ditemukan)`;
                    }
                }).catch(err => {
                    console.warn('Gagal mengambil detail sesi:', err);
                    document.getElementById('qrInfoSesiText').innerText = `Anda akan absen untuk sesi: ${qrSesiId}`;
                });
            } else {
                const qrTabLi = document.querySelector('#qr-tab')?.closest('li');
                if (qrTabLi) qrTabLi.style.display = 'none';
                const manualTab = new bootstrap.Tab(document.getElementById('manual-tab'));
                manualTab.show();
                navTabs.style.display = 'flex';
                loadSesiAktif(false);
            }

            setTimeout(() => {
                initSignaturePad();
            }, 100);

            if (!isQRMode) {
                document.getElementById('manualNama')?.addEventListener('input', saveFormState);
                document.getElementById('manualSesi')?.addEventListener('change', saveFormState);
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
