<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Absensi Petugas Amil Zakat</title>
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Load konfigurasi dan API -->
    <script src="/zakat/js/config.js"></script>
    <script src="/zakat/js/api.js"></script>
    <style>
        /* ========== Style Modern ========== */
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .card-absen {
            max-width: 520px;
            width: 100%;
            border-radius: 28px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .card-header {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            text-align: center;
            border-radius: 28px 28px 0 0 !important;
            padding: 24px 20px;
            border-bottom: none;
        }
        .card-header h3 {
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .card-body {
            padding: 30px;
        }
        .form-label {
            font-weight: 500;
            color: #2d3748;
            margin-bottom: 6px;
        }
        .form-control, .form-select {
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40,167,69,0.15);
        }
        .btn-absen {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            border-radius: 40px;
            padding: 14px;
            font-weight: 600;
            font-size: 1.1rem;
            border: none;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(40,167,69,0.3);
        }
        .btn-absen:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(40,167,69,0.4);
        }
        .btn-absen:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .canvas-container {
            border: 2px dashed #28a745;
            border-radius: 16px;
            padding: 4px;
            background: #f8fafc;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: white;
            border-radius: 12px;
            touch-action: none;
        }
        .ttd-actions button {
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: 500;
        }
        .location-status {
            background: #f8fafc;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 0.95rem;
        }
        .info-sesi {
            background: #e6f7e6;
            border-radius: 16px;
            padding: 12px 16px;
            font-size: 0.95rem;
            border-left: 5px solid #28a745;
        }
        .alert {
            border-radius: 16px;
        }
        .mode-badge {
            font-size: 0.85rem;
            background: #e9ecef;
            padding: 4px 10px;
            border-radius: 40px;
            color: #495057;
        }
    </style>
</head>
<body>
    <div class="card card-absen">
        <div class="card-header">
            <h3><i class="bi bi-building me-2"></i>Masjid Al-Ikhlas Ngijo</h3>
            <p class="mb-0 opacity-75">Form Absensi Petugas</p>
        </div>
        <div class="card-body">
            <div id="alertMessage" class="alert d-none"></div>
            
            <!-- Indikator mode (QR/Manual) -->
            <div class="d-flex justify-content-end mb-2">
                <span id="modeBadge" class="mode-badge"><i class="bi bi-qr-code-scan me-1"></i>Mode QR</span>
            </div>

            <!-- Info sesi untuk mode QR -->
            <div id="infoSesiQR" class="info-sesi d-none mb-4">
                <i class="bi bi-info-circle me-2"></i> <span id="infoSesiText"></span>
            </div>

            <!-- Dropdown sesi untuk mode manual -->
            <div id="manualSesiGroup" class="mb-4 d-none">
                <label for="sesiSelect" class="form-label"><i class="bi bi-calendar-event me-1"></i>Pilih Sesi Aktif</label>
                <select class="form-select" id="sesiSelect" required>
                    <option value="">-- Memuat sesi --</option>
                </select>
                <div class="form-text" id="sesiInfo"></div>
            </div>

            <div class="mb-4">
                <label for="nama" class="form-label"><i class="bi bi-person me-1"></i>Nama Petugas</label>
                <input type="text" class="form-control" id="nama" placeholder="Masukkan nama lengkap" required autocomplete="off">
            </div>

            <div class="mb-4" id="passwordGroup">
                <label for="password" class="form-label"><i class="bi bi-lock me-1"></i>Password Sesi</label>
                <input type="text" class="form-control" id="password" placeholder="Masukkan password sesi" required>
                <div id="passwordInfo" class="form-text mt-1"></div>
            </div>

            <div class="mb-4">
                <label class="form-label"><i class="bi bi-pencil me-1"></i>Tanda Tangan</label>
                <div class="canvas-container">
                    <canvas id="ttdCanvas" width="400" height="200"></canvas>
                </div>
                <div class="ttd-actions d-flex gap-2 mt-3">
                    <button class="btn btn-outline-secondary flex-grow-1" onclick="clearSignature()"><i class="bi bi-eraser me-1"></i> Hapus</button>
                </div>
                <div class="form-text mt-2">Tanda tangani di atas area ini (bisa dengan jari)</div>
            </div>

            <div class="mb-4">
                <label class="form-label"><i class="bi bi-geo-alt me-1"></i>Lokasi</label>
                <div id="locationStatus" class="location-status text-muted d-flex align-items-center">
                    <span class="spinner-border spinner-border-sm me-2" role="status"></span> Mendapatkan lokasi...
                </div>
                <input type="hidden" id="latitude" value="">
                <input type="hidden" id="longitude" value="">
            </div>

            <button class="btn-absen" id="btnSubmit" onclick="submitAbsen()" disabled>
                <span id="submitText">Absen Sekarang</span>
                <span id="submitSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
            </button>
        </div>
    </div>

    <script>
        // ====================== FUNGSI SHOWALERT ======================
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = message;
            alertDiv.classList.remove('d-none');
            setTimeout(() => alertDiv.classList.add('d-none'), 5000);
        }

        // ====================== SETUP CANVAS TTD ======================
        const canvas = document.getElementById('ttdCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let lastX = 0, lastY = 0;

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = 200;
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function startDrawing(e) {
            e.preventDefault();
            drawing = true;
            const pos = getCanvasCoordinates(e);
            lastX = pos.x;
            lastY = pos.y;
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
        }

        function draw(e) {
            e.preventDefault();
            if (!drawing) return;
            const pos = getCanvasCoordinates(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing() {
            drawing = false;
            ctx.closePath();
        }

        function getCanvasCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            return { x, y };
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);

        window.clearSignature = function() {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
        };

        // ====================== GEOLOKASI ======================
        let locationTimeout;
        function getLocation() {
            const locStatus = document.getElementById('locationStatus');
            const latInput = document.getElementById('latitude');
            const lngInput = document.getElementById('longitude');
            const btnSubmit = document.getElementById('btnSubmit');

            if (!navigator.geolocation) {
                locStatus.innerHTML = '<span class="text-danger">Geolokasi tidak didukung</span>';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    latInput.value = position.coords.latitude;
                    lngInput.value = position.coords.longitude;
                    locStatus.innerHTML = `<span class="text-success"><i class="bi bi-check-circle me-1"></i> Lokasi: ${position.coords.latitude.toFixed(6)}, ${position.coords.longitude.toFixed(6)}</span>`;
                    btnSubmit.disabled = false;
                    if (locationTimeout) clearTimeout(locationTimeout);
                },
                function(error) {
                    let msg = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED: msg = 'Izin lokasi ditolak. Aktifkan izin lokasi.'; break;
                        case error.POSITION_UNAVAILABLE: msg = 'Lokasi tidak tersedia.'; break;
                        case error.TIMEOUT: msg = 'Waktu habis. Coba lagi.'; break;
                        default: msg = 'Kesalahan tidak diketahui.';
                    }
                    locStatus.innerHTML = `<span class="text-danger">${msg}</span>`;
                    btnSubmit.disabled = true;
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );

            locationTimeout = setTimeout(() => {
                locStatus.innerHTML = '<span class="text-warning">Mendapatkan lokasi... (mungkin perlu izin)</span>';
            }, 5000);
        }

        // ====================== BACA PARAMETER URL ======================
        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                sesi_id: params.get('sesi_id'),
                token: params.get('token')
            };
        }

        // ====================== MODE DETECTION ======================
        const urlParams = getQueryParams();
        const isQRMode = urlParams.sesi_id && urlParams.token;

        // Elemen yang akan dimanipulasi
        const modeBadge = document.getElementById('modeBadge');
        const infoSesiQR = document.getElementById('infoSesiQR');
        const manualSesiGroup = document.getElementById('manualSesiGroup');
        const passwordInput = document.getElementById('password');
        const passwordInfo = document.getElementById('passwordInfo');
        const sesiSelect = document.getElementById('sesiSelect');
        const sesiInfo = document.getElementById('sesiInfo');
        const btnSubmit = document.getElementById('btnSubmit');

        // Set mode tampilan
        if (isQRMode) {
            modeBadge.innerHTML = '<i class="bi bi-qr-code-scan me-1"></i>Mode QR (Sesi dari QR)';
            infoSesiQR.classList.remove('d-none');
            manualSesiGroup.classList.add('d-none');
            passwordInput.value = urlParams.token;
            passwordInput.readOnly = true;
            passwordInfo.innerHTML = '<i class="bi bi-check-circle text-success"></i> Password terisi otomatis dari QR';
            document.getElementById('infoSesiText').innerText = `Anda akan absen untuk sesi: ${urlParams.sesi_id}`;
        } else {
            modeBadge.innerHTML = '<i class="bi bi-pencil-square me-1"></i>Mode Manual (Pilih Sesi)';
            infoSesiQR.classList.add('d-none');
            manualSesiGroup.classList.remove('d-none');
            passwordInput.readOnly = false;
            passwordInput.value = '';
            passwordInfo.innerHTML = '<i class="bi bi-info-circle"></i> Masukkan password yang diberikan panitia.';
            // Load sesi aktif
            loadSesiAktif();
        }

        // Fungsi load sesi aktif untuk mode manual
        async function loadSesiAktif() {
            try {
                const sesiList = await apiGetSesiAktif();
                if (!sesiList || sesiList.length === 0) {
                    sesiSelect.innerHTML = '<option value="">Tidak ada sesi aktif</option>';
                    sesiInfo.innerHTML = '<span class="text-warning">Belum ada sesi yang aktif saat ini.</span>';
                    btnSubmit.disabled = true;
                    return;
                }
                let options = '<option value="">-- Pilih sesi --</option>';
                sesiList.forEach(sesi => {
                    const mulai = new Date(sesi.waktu_mulai).toLocaleString('id-ID', { hour12: false });
                    const selesai = new Date(sesi.waktu_selesai).toLocaleString('id-ID', { hour12: false });
                    options += `<option value="${sesi.id}">${sesi.nama_sesi} (${mulai} - ${selesai})</option>`;
                });
                sesiSelect.innerHTML = options;
                sesiInfo.innerHTML = '<span class="text-success">Pilih sesi dan masukkan password.</span>';
            } catch (error) {
                console.error('Gagal memuat sesi:', error);
                sesiSelect.innerHTML = '<option value="">Gagal memuat sesi</option>';
                sesiInfo.innerHTML = '<span class="text-danger">Error memuat data sesi.</span>';
            }
        }

        // Jalankan geolokasi saat halaman dimuat
        document.addEventListener('DOMContentLoaded', getLocation);

        // ====================== SUBMIT ABSEN ======================
        window.submitAbsen = async function() {
            // Ambil data berdasarkan mode
            let id_sesi, password;
            if (isQRMode) {
                id_sesi = urlParams.sesi_id;
                password = urlParams.token;
            } else {
                id_sesi = sesiSelect.value;
                password = passwordInput.value.trim();
            }

            const nama = document.getElementById('nama').value.trim();
            const lat = document.getElementById('latitude').value;
            const lng = document.getElementById('longitude').value;
            const btn = document.getElementById('btnSubmit');
            const submitText = document.getElementById('submitText');
            const submitSpinner = document.getElementById('submitSpinner');

            // Validasi
            if (!id_sesi) {
                showAlert(isQRMode ? 'ID sesi tidak ditemukan dari QR' : 'Pilih sesi terlebih dahulu', 'danger');
                return;
            }
            if (!password) {
                showAlert('Password sesi harus diisi', 'danger');
                return;
            }
            if (!nama) {
                showAlert('Nama harus diisi', 'danger');
                return;
            }
            if (!lat || !lng) {
                showAlert('Lokasi belum didapatkan. Tunggu atau periksa izin lokasi.', 'danger');
                return;
            }

            // Cek tanda tangan kosong
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const isEmpty = imageData.every(val => val === 255);
            if (isEmpty) {
                showAlert('Tanda tangan belum diisi', 'danger');
                return;
            }

            const ttdBase64 = canvas.toDataURL('image/png');

            btn.disabled = true;
            submitText.classList.add('d-none');
            submitSpinner.classList.remove('d-none');

            try {
                const result = await apiAbsen({
                    id_sesi: id_sesi,
                    nama_petugas: nama,
                    password: password,
                    latitude: parseFloat(lat),
                    longitude: parseFloat(lng),
                    ttd_base64: ttdBase64
                });

                showAlert('Absen berhasil! Terima kasih.', 'success');
                document.getElementById('nama').value = '';
                clearSignature();
                getLocation(); // refresh lokasi
                
                // Jika mode manual, reset dropdown ke default
                if (!isQRMode) {
                    sesiSelect.value = '';
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Gagal mengirim absen: ' + error.message, 'danger');
            } finally {
                btn.disabled = false;
                submitText.classList.remove('d-none');
                submitSpinner.classList.add('d-none');
            }
        };
    </script>
</body>
</html>
