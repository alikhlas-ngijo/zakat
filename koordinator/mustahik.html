<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koordinator - Data Mustahik</title>
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .table th, .table td { vertical-align: middle; }
        .badge { font-size: 0.9em; padding: 0.5em 0.75em; }
        .action-bar {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-success fixed-top shadow">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="bi bi-building"></i> Koordinator Masjid Al-Ikhlas</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <!-- Sidebar Offcanvas -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebar">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Menu Koordinator</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="fitrah.html"><i class="bi bi-archive"></i> Zakat Fitrah</a></li>
                <li class="nav-item"><a class="nav-link" href="mal.html"><i class="bi bi-cash-stack"></i> Zakat Mal</a></li>
                <li class="nav-item"><a class="nav-link" href="fidyah.html"><i class="bi bi-heart"></i> Zakat Fidyah</a></li>
                <li class="nav-item"><a class="nav-link" href="pezakat.html"><i class="bi bi-people"></i> Data Pezakat</a></li>
                <li class="nav-item"><a class="nav-link active" href="mustahik.html"><i class="bi bi-hand-index-thumb"></i> Data Mustahik</a></li>
                <li class="nav-item"><a class="nav-link" href="laporan.html"><i class="bi bi-file-text"></i> Laporan</a></li>
                <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
            </ul>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mt-5 pt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-success" id="pageTitle">👥 Data Mustahik</h2>
            <div>
                <!-- Tombol Undo/Redo & Hapus Terpilih -->
                <button class="btn btn-secondary me-2" id="undoBtn" onclick="undo()" disabled><i class="bi bi-arrow-return-left"></i> Undo</button>
                <button class="btn btn-secondary me-2" id="redoBtn" onclick="redo()" disabled><i class="bi bi-arrow-return-right"></i> Redo</button>
                <button class="btn btn-danger me-2" id="deleteSelectedBtn" onclick="deleteSelected()" disabled><i class="bi bi-trash"></i> Hapus Terpilih</button>
                <button class="btn btn-success me-2" onclick="tambahData()"><i class="bi bi-plus-circle"></i> Tambah Data</button>
                <button class="btn btn-info me-2" onclick="exportCSV()"><i class="bi bi-download"></i> Ekspor CSV</button>
                <button class="btn btn-warning" onclick="document.getElementById('importFile').click()"><i class="bi bi-upload"></i> Impor CSV</button>
                <input type="file" id="importFile" accept=".csv" style="display: none;" onchange="importCSV(this.files[0])">
            </div>
        </div>

        <!-- Action Bar: Search only (no RT filter) -->
        <div class="action-bar">
            <div class="row g-3 align-items-center">
                <div class="col-md-12">
                    <div class="input-group">
                        <span class="input-group-text bg-success text-white"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" id="searchInput" placeholder="Cari nama, alamat, keterangan..." onkeyup="filterData()">
                        <button class="btn btn-outline-secondary" type="button" onclick="clearSearch()"><i class="bi bi-x"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabel Data -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-success text-center">
                    <tr>
                        <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
                        <th>No</th>
                        <th>ID</th>
                        <th>Nama</th>
                        <th>Alamat</th>
                        <th>RT</th>
                        <th>Kategori</th>
                        <th>Keterangan</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="9" class="text-center">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Tambah / Edit Data -->
    <div class="modal fade" id="formModal" tabindex="-1" aria-labelledby="formModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="formModalLabel">Tambah Mustahik</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="mustahikForm">
                        <input type="hidden" id="editId" value="">
                        <div class="mb-3">
                            <label for="nama" class="form-label">Nama</label>
                            <input type="text" class="form-control" id="nama" required>
                        </div>
                        <div class="mb-3">
                            <label for="alamat" class="form-label">Alamat</label>
                            <textarea class="form-control" id="alamat" rows="2" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="rt" class="form-label">RT</label>
                            <input type="text" class="form-control" id="rt" readonly>
                        </div>
                        <div class="mb-3">
                            <label for="id_kategori" class="form-label">Kategori</label>
                            <select class="form-select" id="id_kategori" required>
                                <option value="">Pilih Kategori</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="keterangan" class="form-label">Keterangan</label>
                            <textarea class="form-control" id="keterangan" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Simpan</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script>
        // ====================== FUNGSI CACHE ======================
        function getCachedData(key) {
            const cached = sessionStorage.getItem(key);
            if (!cached) return null;
            try {
                return JSON.parse(cached);
            } catch (e) {
                return null;
            }
        }

        function setCachedData(key, data) {
            sessionStorage.setItem(key, JSON.stringify(data));
        }

        // ====================== CEK LOGIN ======================
        let user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'koordinator') window.location.href = '../login.html';
        if (!user.rt) { alert('Anda tidak memiliki RT.'); window.location.href = '../login.html'; }
        user.rt = user.rt.toString().padStart(2, '0');
        document.getElementById('pageTitle').innerText = `👥 Data Mustahik RT ${user.rt}`;

        function logout() { localStorage.removeItem('user'); window.location.href = '../login.html'; }

        // ====================== GLOBAL ======================
        let allData = [];
        let filteredData = [];
        let kategoriList = [];
        let kategoriMap = {};
        let modalInstance;

        // ====================== UNDO/REDO & MULTIPLE DELETE ======================
        let undoStack = [];
        let redoStack = [];
        const MAX_UNDO_STACK = 10;

        function pushToUndo(action, items) {
            undoStack.push({ action, items: items.map(item => ({ ...item })) }); // salin
            if (undoStack.length > MAX_UNDO_STACK) undoStack.shift();
            redoStack = [];
            updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            document.getElementById('undoBtn').disabled = undoStack.length === 0;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
        }

        async function undo() {
            if (undoStack.length === 0) return;
            const last = undoStack.pop();
            if (last.action === 'delete') {
                const newIds = [];
                for (let item of last.items) {
                    const newItem = { ...item };
                    delete newItem.id; // biarkan client generate id baru
                    newItem.id = 'M' + Date.now().toString().slice(-6) + Math.random().toString(36).substr(2, 3);
                    try {
                        await apiPost('mustahik', newItem);
                        newIds.push(newItem.id);
                    } catch (error) {
                        alert('Gagal mengembalikan data: ' + error);
                        undoStack.push(last);
                        updateUndoRedoButtons();
                        return;
                    }
                }
                last.newIds = newIds;
                redoStack.push(last);
                await loadData(); // refresh data
            }
            updateUndoRedoButtons();
        }

        async function redo() {
            if (redoStack.length === 0) return;
            const last = redoStack.pop();
            if (last.action === 'delete' && last.newIds) {
                for (let id of last.newIds) {
                    try {
                        await apiDelete('mustahik', id);
                    } catch (error) {
                        alert('Gagal menghapus data: ' + error);
                        redoStack.push(last);
                        updateUndoRedoButtons();
                        return;
                    }
                }
                undoStack.push(last);
                await loadData(); // refresh data
            }
            updateUndoRedoButtons();
        }

        // ====================== FUNGSI CHECKBOX ======================
        function toggleSelectAll(checkbox) {
            const checkboxes = document.querySelectorAll('.rowCheckbox');
            checkboxes.forEach(cb => cb.checked = checkbox.checked);
            updateDeleteSelectedButton();
        }

        function updateDeleteSelectedButton() {
            const selected = document.querySelectorAll('.rowCheckbox:checked').length;
            document.getElementById('deleteSelectedBtn').disabled = selected === 0;
        }

        function getSelectedIds() {
            const checkboxes = document.querySelectorAll('.rowCheckbox:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        async function deleteSelected() {
            const ids = getSelectedIds();
            if (ids.length === 0) return;
            if (!confirm(`Hapus ${ids.length} data terpilih?`)) return;

            const itemsToDelete = allData.filter(d => ids.includes(d.id));
            pushToUndo('delete', itemsToDelete);

            try {
                for (let id of ids) {
                    await apiDelete('mustahik', id);
                }
                await loadData();
                alert('Data terpilih berhasil dihapus.');
            } catch (error) {
                // Jika gagal, batalkan undo stack
                undoStack.pop();
                updateUndoRedoButtons();
                alert('Gagal menghapus beberapa data.');
            }
        }

        // ====================== LOAD KATEGORI ======================
        async function loadKategori() {
            const cacheKey = 'kategori_mustahik';
            const cached = getCachedData(cacheKey);
            if (cached) {
                kategoriList = cached;
                updateKategoriMap();
                populateKategoriDropdown();
            }
            try {
                const fresh = await apiGet('kategori_mustahik');
                setCachedData(cacheKey, fresh);
                kategoriList = fresh;
                updateKategoriMap();
                populateKategoriDropdown();
            } catch (error) {
                console.warn('Gagal memuat kategori', error);
            }
        }

        function updateKategoriMap() {
            kategoriMap = {};
            kategoriList.forEach(k => { kategoriMap[k.id] = `${k.kode} - ${k.deskripsi}`; });
        }

        function populateKategoriDropdown() {
            const select = document.getElementById('id_kategori');
            select.innerHTML = '<option value="">Pilih Kategori</option>';
            kategoriList.forEach(k => {
                const option = document.createElement('option');
                option.value = k.id;
                option.textContent = `${k.kode} - ${k.deskripsi}`;
                select.appendChild(option);
            });
        }

        // ====================== LOAD DATA ======================
        async function loadData() {
            const cacheKey = 'mustahik_' + user.rt;
            const cached = getCachedData(cacheKey);
            if (cached) {
                allData = cached;
                filterData(); // render tabel
            }

            try {
                const fresh = await apiGet('mustahik', { rt: user.rt });
                setCachedData(cacheKey, fresh);
                allData = fresh;
                filterData(); // render ulang
            } catch (error) {
                console.error('Gagal memuat data:', error);
                if (!cached) {
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="text-center text-danger">Gagal memuat data. Periksa koneksi atau API.</td></tr>';
                }
            }
        }

        // ====================== FILTER (search only) ======================
        function filterData() {
            const searchText = document.getElementById('searchInput').value.toLowerCase().trim();

            filteredData = allData.filter(item => {
                if (searchText) {
                    const fields = [
                        item.nama || '',
                        item.alamat || '',
                        item.keterangan || ''
                    ].map(f => f.toLowerCase());
                    if (!fields.some(f => f.includes(searchText))) return false;
                }
                return true;
            });
            renderTable(filteredData);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            filterData();
        }

        // ====================== RENDER TABLE ======================
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (!data.length) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted">Tidak ada data.</td></tr>`;
                return;
            }
            tbody.innerHTML = data.map((item, index) => `
                <tr>
                    <td><input type="checkbox" class="rowCheckbox" value="${item.id}" onchange="updateDeleteSelectedButton()"></td>
                    <td class="text-center">${index+1}</td>
                    <td>${item.id || '-'}</td>
                    <td>${item.nama || '-'}</td>
                    <td>${item.alamat || '-'}</td>
                    <td class="text-center">${item.rt || '-'}</td>
                    <td>${item.id_kategori ? (kategoriMap[item.id_kategori] || '-') : '-'}</td>
                    <td>${item.keterangan || '-'}</td>
                    <td class="text-center">
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-outline-primary" onclick="editData('${item.id}')" title="Edit"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-outline-danger" onclick="hapusData('${item.id}')" title="Hapus"><i class="bi bi-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // ====================== MODAL TAMBAH ======================
        function tambahData() {
            document.getElementById('formModalLabel').innerText = 'Tambah Mustahik';
            document.getElementById('editId').value = '';
            document.getElementById('mustahikForm').reset();
            document.getElementById('rt').value = user.rt;
            document.getElementById('id_kategori').value = '';
            modalInstance.show();
        }

        // ====================== MODAL EDIT ======================
        function editData(id) {
            const item = allData.find(d => d.id == id);
            if (!item) return;
            document.getElementById('formModalLabel').innerText = 'Edit Mustahik';
            document.getElementById('editId').value = item.id;
            document.getElementById('nama').value = item.nama || '';
            document.getElementById('alamat').value = item.alamat || '';
            document.getElementById('rt').value = item.rt || user.rt;
            document.getElementById('id_kategori').value = item.id_kategori || '';
            document.getElementById('keterangan').value = item.keterangan || '';
            modalInstance.show();
        }

        // ====================== SUBMIT FORM ======================
        document.getElementById('mustahikForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const nama = document.getElementById('nama').value;
            const alamat = document.getElementById('alamat').value;
            const rt = document.getElementById('rt').value;
            const id_kategori = document.getElementById('id_kategori').value;
            const keterangan = document.getElementById('keterangan').value;

            if (!nama || !alamat || !rt || !id_kategori) {
                alert('Nama, alamat, RT, dan kategori harus diisi');
                return;
            }

            const data = {
                id: id || 'M' + Date.now().toString().slice(-6),
                nama,
                alamat,
                rt,
                id_kategori,
                keterangan: keterangan || ''
            };

            try {
                if (id) {
                    await apiEdit('mustahik', id, data);
                } else {
                    await apiPost('mustahik', data);
                }
                modalInstance.hide();
                await loadData();
                alert('Data berhasil disimpan (asumsi).');
            } catch (error) {
                alert('Gagal menyimpan: ' + error);
            }
        });

        // ====================== HAPUS DATA ======================
        async function hapusData(id) {
            const item = allData.find(d => d.id == id);
            if (!item) return;
            if (!confirm('Yakin ingin menghapus data ini?')) return;

            pushToUndo('delete', [item]);

            try {
                await apiDelete('mustahik', id);
                await loadData();
                alert('Data berhasil dihapus (asumsi).');
            } catch (error) {
                undoStack.pop();
                updateUndoRedoButtons();
                alert('Gagal menghapus: ' + error);
            }
        }

        // ====================== EKSPOR CSV ======================
        function exportCSV() {
            if (filteredData.length === 0) {
                alert('Tidak ada data untuk diekspor.');
                return;
            }
            const headers = ['No','ID','Nama','Alamat','RT','Kategori','Keterangan'];
            const rows = filteredData.map((item, idx) => [
                idx+1,
                item.id || '',
                item.nama || '',
                item.alamat || '',
                item.rt || '',
                item.id_kategori ? (kategoriMap[item.id_kategori] || '') : '',
                item.keterangan || ''
            ]);
            const csvContent = [headers.join(','), ...rows.map(row => row.join(','))].join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', `data_mustahik_rt_${user.rt}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // ====================== IMPOR CSV ======================
        async function importCSV(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const csv = e.target.result;
                const lines = csv.split('\n').filter(line => line.trim() !== '');
                if (lines.length < 2) {
                    alert('File CSV tidak valid atau kosong.');
                    return;
                }
                const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/\s+/g, '_'));
                const dataRows = lines.slice(1).map(line => {
                    const values = line.split(',');
                    let obj = {};
                    headers.forEach((h, idx) => {
                        let key = h;
                        if (key.includes('id')) key = 'id';
                        else if (key.includes('nama')) key = 'nama';
                        else if (key.includes('alamat')) key = 'alamat';
                        else if (key.includes('rt')) key = 'rt';
                        else if (key.includes('kategori')) key = 'id_kategori';
                        else if (key.includes('keterangan')) key = 'keterangan';
                        obj[key] = values[idx] ? values[idx].trim() : '';
                    });
                    return obj;
                });

                // Validasi: harus ada nama dan alamat
                const validRows = dataRows.filter(row => row.nama && row.nama !== '' && row.alamat);
                if (validRows.length === 0) {
                    alert('Tidak ada data valid untuk diimpor (minimal ada nama dan alamat).');
                    return;
                }

                // Paksa RT semua data menjadi RT user
                validRows.forEach(row => row.rt = user.rt);

                if (!confirm(`Akan mengimpor ${validRows.length} data untuk RT ${user.rt}. Lanjutkan?`)) return;

                const rowsToImport = validRows.map(row => ({
                    id: row.id || 'M' + Date.now().toString().slice(-6) + Math.random().toString(36).substr(2, 3),
                    nama: row.nama,
                    alamat: row.alamat,
                    rt: user.rt,
                    id_kategori: row.id_kategori || '',
                    keterangan: row.keterangan || ''
                }));

                try {
                    const result = await apiImport('mustahik', rowsToImport);
                    if (result.success) {
                        alert('Data berhasil diimpor (asumsi).');
                        await loadData();
                    } else {
                        alert('Gagal mengimpor: ' + result.error);
                    }
                } catch (error) {
                    alert('Gagal mengimpor: ' + error);
                }
            };
            reader.readAsText(file);
        }

        async function apiImport(endpoint, rows) {
            const payload = { action: 'import', endpoint, data: { rows } };
            return fetch(CONFIG.API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'application/json' }
            })
            .then(() => ({ success: true }))
            .catch(err => ({ success: false, error: err.message }));
        }

        // ====================== INIT ======================
        document.addEventListener('DOMContentLoaded', async function() {
            await loadKategori();
            modalInstance = new bootstrap.Modal(document.getElementById('formModal'));
            loadData();

            // Inisialisasi tombol undo/redo
            updateUndoRedoButtons();
        });
    </script>
</body>
</html>
