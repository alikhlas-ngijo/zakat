<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koordinator - Data Mustahik</title>
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== VARIABEL & RESET ===== */
        :root {
            --primary: #2e7d32;
            --primary-light: #4caf50;
            --primary-soft: #e8f5e9;
            --secondary: #ffb300;
            --danger: #d32f2f;
            --gray-bg: #f4f6f9;
            --text-dark: #1e2a3a;
            --text-muted: #6c757d;
            --border-radius: 12px;
            --box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s ease;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--gray-bg);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: var(--primary);
            color: white;
            transition: width 0.3s ease, transform 0.3s ease;
            z-index: 1050;
            overflow-y: auto;
            box-shadow: 2px 0 20px rgba(0,0,0,0.1);
        }
        .sidebar.minimized {
            width: 80px;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .sidebar-header h4 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
        }
        .sidebar.minimized .sidebar-header h4 {
            display: none;
        }
        .sidebar.minimized .sidebar-header {
            justify-content: center;
            padding: 1rem 0;
        }
        .sidebar-toggle-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 5px;
            line-height: 1;
        }
        .btn-close-white {
            filter: brightness(0) invert(1);
        }
        .sidebar .nav {
            padding: 1rem 0;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.85);
            padding: 12px 20px;
            border-radius: 0;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
        }
        .sidebar .nav-link i {
            width: 24px;
            font-size: 1.2rem;
            text-align: center;
        }
        .sidebar .nav-link span {
            transition: opacity 0.2s;
        }
        .sidebar.minimized .nav-link span {
            display: none;
        }
        .sidebar.minimized .nav-link i {
            margin-right: 0;
            font-size: 1.5rem;
            width: 100%;
        }
        .sidebar .nav-link:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .sidebar .nav-link.active {
            background: white;
            color: var(--primary);
            font-weight: 600;
            border-left: 4px solid var(--secondary);
        }
        .sidebar .nav-link.active i {
            color: var(--primary);
        }
        .sidebar .nav-link.text-danger {
            color: #ffb3b3 !important;
        }
        .sidebar .nav-link.text-danger:hover {
            background: rgba(255,255,255,0.1);
            color: #ff8a8a !important;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
            transition: margin-left 0.3s ease;
            background: var(--gray-bg);
        }
        .sidebar.minimized + .main-content {
            margin-left: 80px;
        }
        .navbar-mobile {
            display: none;
            background: white;
            padding: 12px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            align-items: center;
            gap: 15px;
        }
        .navbar-mobile h5 {
            margin: 0;
            font-weight: 600;
            color: var(--primary);
        }
        .container-fluid {
            padding: 20px 30px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 991.98px) {
            .sidebar {
                transform: translateX(-100%);
                width: 260px !important;
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .sidebar.minimized .sidebar-header h4,
            .sidebar.minimized .nav-link span {
                display: inline-block;
            }
            .sidebar.minimized .nav-link i {
                font-size: 1.2rem;
                width: 24px;
                text-align: left;
            }
            .main-content {
                margin-left: 0 !important;
            }
            .navbar-mobile {
                display: flex;
            }
            .container-fluid {
                padding: 15px;
            }
        }

        /* ===== KOMPONEN KHUSUS ===== */
        .action-bar {
            background: white;
            padding: 1rem;
            border-radius: var(--border-radius);
            margin-bottom: 1.5rem;
            box-shadow: var(--box-shadow);
        }
        .table th, .table td {
            vertical-align: middle;
        }
        /* Loading Overlay */
        #loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,20,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            transition: opacity 0.3s;
        }
        #loading-overlay .spinner-border {
            width: 4rem;
            height: 4rem;
            border-width: 0.3rem;
        }
        /* === Tambahan untuk memperindah grup tombol === */
        .btn-group {
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border-radius: 8px;
            overflow: hidden;
        }
        .btn-group .btn {
            border: none;
            padding: 0.5rem 1rem;
        }
        .btn-group .btn:hover {
            filter: brightness(95%);
        }
        @media (max-width: 576px) {
            .btn-group .btn {
                padding: 0.5rem 0.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="spinner-border text-light" role="status"></div>
        <div id="loading-progress" class="mt-3 h4">0%</div>
        <div id="loading-message" class="mt-2">Memuat data...</div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h4><i class="bi bi-building"></i> Koordinator</h4>
            <button class="sidebar-toggle-btn d-none d-lg-block" onclick="toggleSidebarMinimize()" id="sidebarToggleBtn">
                <i class="bi bi-arrow-left-circle" id="toggleIcon"></i>
            </button>
            <button class="btn-close btn-close-white d-lg-none" onclick="toggleSidebar()"></button>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> <span>Dashboard</span></a></li>
            <li class="nav-item"><a class="nav-link" href="fitrah.html"><i class="bi bi-archive"></i> <span>Zakat Fitrah</span></a></li>
            <li class="nav-item"><a class="nav-link" href="mal.html"><i class="bi bi-cash-stack"></i> <span>Zakat Mal</span></a></li>
            <li class="nav-item"><a class="nav-link" href="fidyah.html"><i class="bi bi-heart"></i> <span>Zakat Fidyah</span></a></li>
            <li class="nav-item"><a class="nav-link" href="pezakat.html"><i class="bi bi-people"></i> <span>Data Pezakat</span></a></li>
            <li class="nav-item"><a class="nav-link active" href="mustahik.html"><i class="bi bi-hand-index-thumb"></i> <span>Data Mustahik</span></a></li>
            <li class="nav-item"><a class="nav-link" href="laporan.html"><i class="bi bi-file-text"></i> <span>Laporan</span></a></li>
            <li class="nav-item"><a class="nav-link" href="../index.html"><i class="bi bi-house-door"></i> <span>Beranda</span></a></li>
            <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> <span>Logout</span></a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <nav class="navbar-mobile">
            <button class="btn btn-success" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            <h5>Data Mustahik</h5>
        </nav>

        <div class="container-fluid">
            <!-- Header dengan tombol aksi (TATA LETAK BARU) -->
            <div class="d-flex flex-wrap align-items-center gap-2 mb-4">
                <h2 class="text-success me-auto" id="pageTitle">👥 Data Mustahik</h2>

                <!-- Grup Undo/Redo -->
                <div class="btn-group" role="group">
                    <button class="btn btn-outline-secondary" id="undoBtn" onclick="undo()" disabled title="Undo">
                        <i class="bi bi-arrow-return-left"></i> <span class="d-none d-md-inline">Undo</span>
                    </button>
                    <button class="btn btn-outline-secondary" id="redoBtn" onclick="redo()" disabled title="Redo">
                        <i class="bi bi-arrow-return-right"></i> <span class="d-none d-md-inline">Redo</span>
                    </button>
                </div>

                <!-- Grup Aksi Data: Tambah & Hapus Terpilih -->
                <div class="btn-group" role="group">
                    <button class="btn btn-success" onclick="tambahData()" title="Tambah Data">
                        <i class="bi bi-plus-circle"></i> <span class="d-none d-md-inline">Tambah</span>
                    </button>
                    <button class="btn btn-danger" id="deleteSelectedBtn" onclick="deleteSelected()" disabled title="Hapus Terpilih">
                        <i class="bi bi-trash"></i> <span class="d-none d-md-inline">Hapus</span>
                    </button>
                </div>

                <!-- Grup Ekspor/Impor CSV -->
                <div class="btn-group" role="group">
                    <button class="btn btn-info" onclick="exportCSV()" title="Ekspor CSV">
                        <i class="bi bi-download"></i> <span class="d-none d-md-inline">Ekspor</span>
                    </button>
                    <button class="btn btn-warning" onclick="document.getElementById('importFile').click()" title="Impor CSV">
                        <i class="bi bi-upload"></i> <span class="d-none d-md-inline">Impor</span>
                    </button>
                </div>

                <!-- Input file tersembunyi untuk impor -->
                <input type="file" id="importFile" accept=".csv" style="display: none;" onchange="importCSV(this.files[0])">
            </div>

            <!-- Action Bar: Search only -->
            <div class="action-bar">
                <div class="row g-3 align-items-center">
                    <div class="col-md-12">
                        <div class="input-group">
                            <span class="input-group-text bg-success text-white"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control" id="searchInput" placeholder="Cari nama, alamat, keterangan..." onkeyup="filterData()">
                            <button class="btn btn-outline-secondary" type="button" onclick="clearSearch()"><i class="bi bi-x"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabel Data -->
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-success text-center">
                        <tr>
                            <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
                            <th>No</th>
                            <th>ID</th>
                            <th>Nama</th>
                            <th>Alamat</th>
                            <th>RT</th>
                            <th>Kategori</th>
                            <th>Keterangan</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="9" class="text-center">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Tambah / Edit Data -->
    <div class="modal fade" id="formModal" tabindex="-1" aria-labelledby="formModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="formModalLabel">Tambah Mustahik</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="mustahikForm">
                        <input type="hidden" id="editId" value="">
                        <div class="mb-3">
                            <label for="nama" class="form-label">Nama</label>
                            <input type="text" class="form-control" id="nama" required>
                        </div>
                        <div class="mb-3">
                            <label for="alamat" class="form-label">Alamat</label>
                            <textarea class="form-control" id="alamat" rows="2" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="rt" class="form-label">RT</label>
                            <input type="text" class="form-control" id="rt" readonly>
                        </div>
                        <div class="mb-3">
                            <label for="id_kategori" class="form-label">Kategori</label>
                            <select class="form-select" id="id_kategori" required>
                                <option value="">Pilih Kategori</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="keterangan" class="form-label">Keterangan</label>
                            <textarea class="form-control" id="keterangan" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Simpan</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/loader.js"></script>
    <script>
        // ====================== FUNGSI SIDEBAR ======================
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
        }

        function toggleSidebarMinimize() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('toggleIcon');
            sidebar.classList.toggle('minimized');
            const isMinimized = sidebar.classList.contains('minimized');
            if (isMinimized) {
                icon.classList.remove('bi-arrow-left-circle');
                icon.classList.add('bi-arrow-right-circle');
            } else {
                icon.classList.remove('bi-arrow-right-circle');
                icon.classList.add('bi-arrow-left-circle');
            }
            localStorage.setItem('sidebarMinimized', isMinimized);
        }

        // ====================== CEK LOGIN ======================
        let user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'koordinator') window.location.href = '../login.html';
        if (!user.rt) { alert('Anda tidak memiliki RT.'); window.location.href = '../login.html'; }
        user.rt = user.rt.toString().padStart(2, '0');
        document.getElementById('pageTitle').innerText = `👥 Data Mustahik RT ${user.rt}`;

        function logout() { localStorage.removeItem('user'); window.location.href = '../login.html'; }

        // ====================== GLOBAL ======================
        let allData = [];
        let filteredData = [];
        let kategoriList = [];
        let kategoriMap = {};
        let modalInstance;

        // ====================== UNDO/REDO & MULTIPLE DELETE ======================
        let undoStack = [];
        let redoStack = [];
        const MAX_UNDO_STACK = 10;

        function pushToUndo(action, items) {
            undoStack.push({ action, items: items.map(item => ({ ...item })) });
            if (undoStack.length > MAX_UNDO_STACK) undoStack.shift();
            redoStack = [];
            updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            document.getElementById('undoBtn').disabled = undoStack.length === 0;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
        }

        async function undo() {
            if (undoStack.length === 0) return;
            const last = undoStack.pop();
            if (last.action === 'delete') {
                const newIds = [];
                for (let item of last.items) {
                    const newItem = { ...item };
                    delete newItem.id;
                    newItem.id = 'M' + Date.now().toString().slice(-6) + Math.random().toString(36).substr(2, 3);
                    try {
                        await apiPost('mustahik', newItem);
                        newIds.push(newItem.id);
                    } catch (error) {
                        alert('Gagal mengembalikan data: ' + error);
                        undoStack.push(last);
                        updateUndoRedoButtons();
                        return;
                    }
                }
                last.newIds = newIds;
                redoStack.push(last);
                await refreshData();
            }
            updateUndoRedoButtons();
        }

        async function redo() {
            if (redoStack.length === 0) return;
            const last = redoStack.pop();
            if (last.action === 'delete' && last.newIds) {
                for (let id of last.newIds) {
                    try {
                        await apiDelete('mustahik', id);
                    } catch (error) {
                        alert('Gagal menghapus data: ' + error);
                        redoStack.push(last);
                        updateUndoRedoButtons();
                        return;
                    }
                }
                undoStack.push(last);
                await refreshData();
            }
            updateUndoRedoButtons();
        }

        // ====================== FUNGSI CHECKBOX ======================
        function toggleSelectAll(checkbox) {
            const checkboxes = document.querySelectorAll('.rowCheckbox');
            checkboxes.forEach(cb => cb.checked = checkbox.checked);
            updateDeleteSelectedButton();
        }

        function updateDeleteSelectedButton() {
            const selected = document.querySelectorAll('.rowCheckbox:checked').length;
            document.getElementById('deleteSelectedBtn').disabled = selected === 0;
        }

        function getSelectedIds() {
            const checkboxes = document.querySelectorAll('.rowCheckbox:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        async function deleteSelected() {
            const ids = getSelectedIds();
            if (ids.length === 0) return;
            if (!confirm(`Hapus ${ids.length} data terpilih?`)) return;

            const itemsToDelete = allData.filter(d => ids.includes(d.id));
            pushToUndo('delete', itemsToDelete);

            try {
                for (let id of ids) {
                    await apiDelete('mustahik', id);
                }
                await refreshData();
                alert('Data terpilih berhasil dihapus.');
            } catch (error) {
                undoStack.pop();
                updateUndoRedoButtons();
                alert('Gagal menghapus beberapa data.');
            }
        }

        // ====================== FUNGSI REFRESH DATA ======================
        async function refreshData() {
            await LOADER.loadMultiple(['mustahik', 'kategori_mustahik'], true, false);
            loadDataFromCache();
        }

        // ====================== LOAD KATEGORI DARI CACHE ======================
        function loadKategoriFromCache() {
            kategoriList = LOADER.getData('kategori_mustahik');
            updateKategoriMap();
            populateKategoriDropdown();
        }

        function updateKategoriMap() {
            kategoriMap = {};
            kategoriList.forEach(k => { kategoriMap[k.id] = `${k.kode} - ${k.deskripsi}`; });
        }

        function populateKategoriDropdown() {
            const select = document.getElementById('id_kategori');
            if (!select) return;
            select.innerHTML = '<option value="">Pilih Kategori</option>';
            kategoriList.forEach(k => {
                const option = document.createElement('option');
                option.value = k.id;
                option.textContent = `${k.kode} - ${k.deskripsi}`;
                select.appendChild(option);
            });
        }

        // ====================== LOAD DATA MUSTAHIK DARI CACHE (filter RT) ======================
        function loadDataFromCache() {
            const semuaMustahik = LOADER.getData('mustahik');
            allData = semuaMustahik.filter(m => m.rt === user.rt);
            filterData();
        }

        // ====================== FILTER ======================
        function filterData() {
            const searchText = document.getElementById('searchInput').value.toLowerCase().trim();

            filteredData = allData.filter(item => {
                if (searchText) {
                    const fields = [
                        item.nama || '',
                        item.alamat || '',
                        item.keterangan || ''
                    ].map(f => f.toLowerCase());
                    if (!fields.some(f => f.includes(searchText))) return false;
                }
                return true;
            });
            renderTable(filteredData);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            filterData();
        }

        // ====================== RENDER TABLE ======================
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (!data.length) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted">Tidak ada data.</td></tr>`;
                return;
            }
            tbody.innerHTML = data.map((item, index) => `
                <tr>
                    <td><input type="checkbox" class="rowCheckbox" value="${item.id}" onchange="updateDeleteSelectedButton()"></td>
                    <td class="text-center">${index+1}</td>
                    <td>${item.id || '-'}</td>
                    <td>${item.nama || '-'}</td>
                    <td>${item.alamat || '-'}</td>
                    <td class="text-center">${item.rt || '-'}</td>
                    <td>${item.id_kategori ? (kategoriMap[item.id_kategori] || '-') : '-'}</td>
                    <td>${item.keterangan || '-'}</td>
                    <td class="text-center">
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-outline-primary" onclick="editData('${item.id}')" title="Edit"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-outline-danger" onclick="hapusData('${item.id}')" title="Hapus"><i class="bi bi-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // ====================== MODAL TAMBAH ======================
        function tambahData() {
            document.getElementById('formModalLabel').innerText = 'Tambah Mustahik';
            document.getElementById('editId').value = '';
            document.getElementById('mustahikForm').reset();
            document.getElementById('rt').value = user.rt;
            document.getElementById('id_kategori').value = '';
            modalInstance.show();
        }

        // ====================== MODAL EDIT ======================
        function editData(id) {
            const item = allData.find(d => d.id == id);
            if (!item) return;
            document.getElementById('formModalLabel').innerText = 'Edit Mustahik';
            document.getElementById('editId').value = item.id;
            document.getElementById('nama').value = item.nama || '';
            document.getElementById('alamat').value = item.alamat || '';
            document.getElementById('rt').value = item.rt || user.rt;
            document.getElementById('id_kategori').value = item.id_kategori || '';
            document.getElementById('keterangan').value = item.keterangan || '';
            modalInstance.show();
        }

        // ====================== SUBMIT FORM ======================
        document.getElementById('mustahikForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const nama = document.getElementById('nama').value;
            const alamat = document.getElementById('alamat').value;
            const rt = document.getElementById('rt').value;
            const id_kategori = document.getElementById('id_kategori').value;
            const keterangan = document.getElementById('keterangan').value;

            if (!nama || !alamat || !rt || !id_kategori) {
                alert('Nama, alamat, RT, dan kategori harus diisi');
                return;
            }

            const data = {
                id: id || 'M' + Date.now().toString().slice(-6) + Math.random().toString(36).substr(2, 3),
                nama,
                alamat,
                rt,
                id_kategori,
                keterangan: keterangan || ''
            };

            try {
                if (id) {
                    await apiEdit('mustahik', id, data);
                } else {
                    await apiPost('mustahik', data);
                }
                modalInstance.hide();
                await refreshData();
                alert('Data berhasil disimpan.');
            } catch (error) {
                alert('Gagal menyimpan: ' + error);
            }
        });

        // ====================== HAPUS DATA ======================
        async function hapusData(id) {
            const item = allData.find(d => d.id == id);
            if (!item) return;
            if (!confirm('Yakin ingin menghapus data ini?')) return;

            pushToUndo('delete', [item]);

            try {
                await apiDelete('mustahik', id);
                await refreshData();
                alert('Data berhasil dihapus.');
            } catch (error) {
                undoStack.pop();
                updateUndoRedoButtons();
                alert('Gagal menghapus: ' + error);
            }
        }

        // ====================== EKSPOR CSV ======================
        function exportCSV() {
            if (filteredData.length === 0) {
                alert('Tidak ada data untuk diekspor.');
                return;
            }
            const headers = ['No','ID','Nama','Alamat','RT','Kategori','Keterangan'];
            const rows = filteredData.map((item, idx) => [
                idx+1,
                item.id || '',
                item.nama || '',
                item.alamat || '',
                item.rt || '',
                item.id_kategori ? (kategoriMap[item.id_kategori] || '') : '',
                item.keterangan || ''
            ]);
            const csvContent = [headers.join(','), ...rows.map(row => row.join(','))].join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', `data_mustahik_rt_${user.rt}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // ====================== IMPOR CSV ======================
        async function importCSV(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const csv = e.target.result;
                const lines = csv.split('\n').filter(line => line.trim() !== '');
                if (lines.length < 2) {
                    alert('File CSV tidak valid atau kosong.');
                    return;
                }
                const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/\s+/g, '_'));
                const dataRows = lines.slice(1).map(line => {
                    const values = line.split(',');
                    let obj = {};
                    headers.forEach((h, idx) => {
                        let key = h;
                        if (key.includes('id')) key = 'id';
                        else if (key.includes('nama')) key = 'nama';
                        else if (key.includes('alamat')) key = 'alamat';
                        else if (key.includes('rt')) key = 'rt';
                        else if (key.includes('kategori')) key = 'id_kategori';
                        else if (key.includes('keterangan')) key = 'keterangan';
                        obj[key] = values[idx] ? values[idx].trim() : '';
                    });
                    return obj;
                });

                // Validasi: harus ada nama dan alamat
                const validRows = dataRows.filter(row => row.nama && row.nama !== '' && row.alamat);
                if (validRows.length === 0) {
                    alert('Tidak ada data valid untuk diimpor (minimal ada nama dan alamat).');
                    return;
                }

                // Paksa RT semua data menjadi RT user
                validRows.forEach(row => row.rt = user.rt);

                if (!confirm(`Akan mengimpor ${validRows.length} data untuk RT ${user.rt}. Lanjutkan?`)) return;

                const rowsToImport = validRows.map(row => ({
                    id: row.id || 'M' + Date.now().toString().slice(-6) + Math.random().toString(36).substr(2, 3),
                    nama: row.nama,
                    alamat: row.alamat,
                    rt: user.rt,
                    id_kategori: row.id_kategori || '',
                    keterangan: row.keterangan || ''
                }));

                try {
                    const result = await apiImport('mustahik', rowsToImport);
                    if (result.success) {
                        alert('Data berhasil diimpor.');
                        await refreshData();
                    } else {
                        alert('Gagal mengimpor: ' + result.error);
                    }
                } catch (error) {
                    alert('Gagal mengimpor: ' + error);
                }
            };
            reader.readAsText(file);
        }

        async function apiImport(endpoint, rows) {
            const payload = { action: 'import', endpoint, data: { rows } };
            return fetch(CONFIG.API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'application/json' }
            })
            .then(() => ({ success: true }))
            .catch(err => ({ success: false, error: err.message }));
        }

        // ====================== INIT ======================
        document.addEventListener('DOMContentLoaded', async function() {
            // Cek status sidebar tersimpan
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('toggleIcon');
            const isMinimized = localStorage.getItem('sidebarMinimized') === 'true';
            if (isMinimized) {
                sidebar.classList.add('minimized');
                if (icon) {
                    icon.classList.remove('bi-arrow-left-circle');
                    icon.classList.add('bi-arrow-right-circle');
                }
            }

            const overlay = document.getElementById('loading-overlay');
            const neededEndpoints = ['mustahik', 'kategori_mustahik'];

            // Cek apakah data yang diperlukan sudah ada di cache
            const needLoad = neededEndpoints.filter(ep => !LOADER.getData(ep).length);
            if (needLoad.length > 0) {
                overlay.style.display = 'flex';
                try {
                    await LOADER.loadMultiple(needLoad, false, false, (progress, message) => {
                        document.getElementById('loading-progress').innerText = progress + '%';
                        document.getElementById('loading-message').innerText = message;
                    });
                } catch (e) {
                    console.error('Gagal memuat data:', e);
                } finally {
                    overlay.style.display = 'none';
                }
            }

            modalInstance = new bootstrap.Modal(document.getElementById('formModal'));

            loadKategoriFromCache();
            loadDataFromCache();

            // Inisialisasi tombol undo/redo
            updateUndoRedoButtons();
        });
    </script>
</body>
